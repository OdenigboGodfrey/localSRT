<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LocalSRT</title>

    <style>
        /* -------------------------
   THEME SYSTEM
--------------------------*/
        :root {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #111;
            --accent: #4f46e5;
            --border: #ddd;
        }

        /* automatically switch to dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #111827;
                --text: #e5e7eb;
                --accent: #6366f1;
                --border: #1f2937;
            }
        }

        /* -------------------------
   LAYOUT
--------------------------*/
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* -------------------------
   CARD
--------------------------*/
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }


        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        button,
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 15px;
            text-align: center;
        }

        /* progress bar */
        .progress {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.2s;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>LocalSRT</h2>

        <button onclick="selectFile()">Select File</button>
        <p style="text-align: center">Or</p>
        <button onclick="selectFolder()">Select Folder</button>
        <p id="filePath">No file selected</p>

        <p>Video Chunk Length in seconds <span style="font-size: 12px;">(This is how many seconds to transcribe in a batch. Longer lengths will take more memory)</span></p>
        <input type="number" id="chunk" value="30">

        <label>Model</label>
        <select id="model">
            <option value="tiny">tiny</option>
            <option value="base" selected>base</option>
            <option value="medium">medium</option>
            <option value="large">large</option>
        </select>

        <button onclick="run()">Start</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <p id="status"></p>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:3555";
        const WEBSOCKET_URL = "ws://127.0.0.1:3555/ws";

        let selectedPath = ""
        let totalChunks = 1

        async function selectFile() {
            const res = await fetch("/select-file")
            const data = await res.json()

            if (!data.path) return

            selectedPath = data.path

            document.getElementById("filePath").innerText =
                "Selected: " + selectedPath
        }

        async function selectFolder() {
            const res = await fetch("/select-folder")
            const data = await res.json()

            if (!data.path) return

            selectedPath = data.path

            document.getElementById("filePath").innerText =
                "Selected: " + selectedPath
        }

        /* -------------------------
           RUN JOB
        --------------------------*/
        async function run() {

            if (!selectedPath) {
                alert("Select a file first")
                return
            }

            document.getElementById("status").innerText =
                "Starting..."

            const res = await fetch(`${API_URL}/run`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    path: selectedPath,
                    chunk_length: parseInt(document.getElementById("chunk").value),
                    model_size: document.getElementById("model").value
                })
            })

            const data = await res.json()
            if (data.output) {
                document.getElementById("status").innerText =
                "Done: " + data.output
            }
        }

        const ws = new WebSocket(`${WEBSOCKET_URL}`)

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data)

            const percent =
                (data.current / data.total) * 100

            document.getElementById("bar").style.width =
                percent + "%";
            
            if (percent == 100) {
                const totalFiles = data.total_files
                const currentFile = data.current_file
                let message = "Completed. SRT file saved to the same directory as the video."
                if (currentFile <= totalFiles) {
                    message = `${(currentFile + 1)}/${totalFiles} files processed. SRT file saved to the same directory as the video.`
                }
                document.getElementById("status").innerText = message
                
            }
            else {
            document.getElementById("status").innerText = data.status;
            }
        }

    </script>

</body>

</html>
