name: Build LocalSRT

on:
  push:
    tags:
      - "v*"
    # branches:
    #   - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0
      - name: Clean environment (IMPORTANT)
        run: |
          pip cache purge || true
          rm -rf ~/.cache/* || true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Linux binary
        env:
          CT2_FORCE_CPU: "1"
        run: |
          pyinstaller main.py \
            --onefile \
            --clean \
            --noconfirm \
            --name localSRT-linux \
            --add-data "bin/linux/ffmpeg:bin" \
            --add-data "bin/linux/ffprobe:bin" \
            --add-data "ui:ui" \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --exclude-module nvidia \
            --exclude-module triton \
            --exclude-module tensorflow
      - name: Set executable permission
        run: |
          chmod 755 dist/localSRT-linux
          ls -lah dist/
          file dist/localSRT-linux
      - name: Upload localSRT Linux to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/localSRT-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GTH_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Windows exe
        run: |
          pyinstaller main.py --onefile `
            --add-data "bin/windows/ffmpeg.exe;bin" `
            --add-data "bin/windows/ffprobe.exe;bin" `
            --add-data "ui;ui" `
            --name localSRT-windows

      - name: Upload localSRT Windows to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/localSRT-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GTH_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller main.py --onefile \
            --add-data "bin/macos:bin" \
            --add-data "ui:ui" \
            --name localSRT-macos

      - name: Upload localSRT macOS to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/localSRT-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GTH_TOKEN }}
    
